slug: sales-assistant
name: Sales Assistant
description: Reference sales-operations agent. Searches Zoom, HubSpot, Gmail, and Google Drive; drafts summaries, follow-ups, and proposals. Use as a starter example for building your own vertical agents.
icon: sparkles
active: true
model: gpt-5.4
temperature: '0.3'
systemPromptFile: sales-assistant.system-prompt.md
# BYOA cutover: this agent runs on the standalone agent-runtime artifact
# (localhost :8080 in dev — `npm run dev:agent-runtime`; AgentCore Runtime
# when VOCION_AGENT_RUNTIME_ARN is set). VOCION_DISABLE_RUNTIME=1 falls
# back to the in-process loop.
harness:
  provider: runtime
# v0.2 — chat UX ornaments and deepagents-runtime fields.
accent: amber
eyebrow: Workspace · Sales Assistant
suggestions:
  - label: List my recent discovery calls
    prompt: List my recent discovery calls and briefly summarize each; tell me which one looks most likely to need a follow-up.
  - label: Draft a follow-up email
    prompt: For the most recent discovery call, draft a follow-up email that recaps what we heard and proposes a concrete next step.
  - label: Summarize a deal
    prompt: Pick the most active open deal and give me a one-paragraph status — where it stands, what's blocking, and what the next move should be.
playbookTags:
  - proposal
learningSteps:
  - global
subagents:
  - name: research-runner
    description: Reads a meeting transcript or thread and returns a tight 5-bullet brief — key facts, decisions, owners, blockers, dollar amounts. Use before drafting any artifact when raw conversation content is large.
    systemPrompt: |
      You are the research-runner subagent. Read whatever the parent
      hands you (transcript excerpt, email thread, Slack thread) and
      return EXACTLY 5 bullets in this shape:

      1. **Key facts** — names, companies, dollar amounts, dates.
      2. **Decisions made** — what got agreed, what stayed open.
      3. **Owners** — who is doing what next.
      4. **Blockers** — what would prevent the next step.
      5. **Quotes worth keeping** — 1–2 short direct quotes that would
         carry weight in a proposal or follow-up.

      Be terse. Do not editorialize. Quote source verbatim where you can.
  - name: self-improver
    description: Reviews user feedback (deck comments, prior chat, applied vs rejected suggestions) to surface candidate learnings the agent should adopt. Returns a structured markdown report listing each candidate with target step, draft rule text, source/evidence, and any near-duplicate of an existing rule. Does NOT commit anything — the main agent owns user approval and calling add_learning. Use when the user asks to 'review feedback', 'propose learnings', 'find patterns', etc.
    systemPrompt: |
      You are a self-improvement researcher. Scan past user feedback,
      find recurring patterns, and surface candidate rules that would
      prevent the same back-and-forth in the future.

      Tools you should use:
      - `list_recent_runs` — survey recent operation runs with feedback.
      - `list_run_feedback` — read the full comment thread for a run.
      - `list_learning_steps` and `get_learnings` — read existing rules
        so you don't propose redundant ones.
      - `check_learning_dedup` — verify a candidate isn't already covered.

      You DO NOT call `add_learning` / `update_learning` / `remove_learning`.
      The main agent owns the approval step.

      Workflow:
      1. Identify the scope from the prompt (one run, last week, etc.).
         If unclear, default to the 10 most recent runs.
      2. Read feedback for each. Look for: (a) the user reacting to the
         same problem multiple times, (b) edits where you had to back
         out and try again, (c) explicit instructions like "always X"
         or "never Y" that weren't already in learnings.
      3. For each pattern, draft ONE rule. Format: a strong directive
         sentence ("Always …", "Prefer …", "When the user says X, do
         Y instead"), then a one-line **Why:** with the evidence, then
         **How to apply:** describing where it kicks in.
      4. For each draft, run `check_learning_dedup` to flag near-matches.
      5. Return a markdown summary structured like:
          ### Proposed rule N — `<step>`
          **Rule:** ...
          **Why:** ...
          **How to apply:** ...
          **Source:** evidence (run ids + brief quotes)
          **Near-duplicate:** existing rule_id or 'none'

      Aim for 2–6 high-quality candidates, not a brain-dump. If you find
      no patterns, say so — don't invent.
skills:
  - discovery_summary
  - draft_followup_email
  - draft_mvp_proposal
  - find_related_conversations
  - search_everything
  - summarize_deal
  - draft_proposal_brief
  - inbox_triage
  - aging_pipeline
  - draft_lead_response
  - capability_asset_selection
  - account_timeline
  - objection_analysis
connectorSources:
  - zoom
  - hubspot
  - gmail
  - google_drive
  - google_calendar
  - slack
objectTypes:
  - discovery_call
  - deal
  - account
  - kickoff_call
searchConfig:
  maxResults: 10
  minRelevance: 0
  recencyDecay: 0.98
  sourceWeights:
    zoom: 1.5
    gmail: 1.2
    slack: 0.9
    hubspot: 1.3
    google_drive: 0.8
    google_calendar: 1
fewShotExamples:
  - input: What discovery calls did I have this week?
    label: 'Good: cites sources by number, includes key details (duration, budget, timeline, next steps), offers next actions'
    output: |-
      Here are the discovery calls from this week:

      1. **Dr. K — Unmuted** — 25 min, today [1]
         - Building an AI-powered adaptive learning platform for trauma healing
         - Budget: $70-90K for Phase 1 PWA
         - Timeline: Alpha by April, not rushing
         - Next steps: NDA sent, Dr. K sending tech specs, follow-up call to review

      2. **Kevin / Kristen — MetaCTO Discovery Call** — 32 min, Tuesday [2]
         - Topics: project scope, timeline, budget, goals
         - Next steps: send capabilities deck, schedule follow-up

      Want me to summarize either call in detail or draft a follow-up email?
  - input: Show me recent Zoom meetings
    label: 'Good: recent first, brief format, distinguishes prospect vs internal calls'
    output: |-
      Here are your most recent Zoom meetings:

      1. **Dr. K — Unmuted discovery call** — today, 25 min [1]
      2. **Joel: MetaCTO <> Intro Call** — yesterday, 22 min [2]
      3. **Jeana Hicks: MetaCTO <> Intro Call** — yesterday, 32 min [3]
      4. **Jack Kelly: MetaCTO <> Intro Call** — Mon, 37 min [4]
      5. **1:1 Akram <> Chris** — Mon, 24 min (recurring sync) [5]

      Calls [1]-[4] appear to be prospect conversations. [5] is an internal sync.
