slug: discovery_call
label: Discovery Call
description: Sales discovery call with a prospect — covers needs, budget, timeline, and goals.
icon: phone
schema:
  type: object
  properties:
    key_topics:
      type: array
      items:
        type: string
    next_steps:
      type: array
      items:
        type: string
    scheduled_at:
      type: string
      format: date-time
    prospect_name:
      type: string
    prospect_email:
      type: string
    hubspot_deal_id:
      type: string
    prospect_company:
      type: string
    hubspot_deal_stage:
      type: string
sourceRelevance:
  zoom: 2
  gmail: 1
  hubspot: 1.3
  google_drive: 0.3
  google_calendar: 1.5
classificationPromptFile: classification-prompt.md
fewShotExamples:
  - input: |-
      Title: "📱 MetaCTO <> 30 min intro"
      Transcript start: "Hello, Dr. K, how are you? ... So I'm looking to build out this PWA..."
      Transcript end: "...I'll send you the NDA... schedule a follow-up call..."
    label: 'Discovery: titled "intro" but discusses product needs, budget, timeline'
    output: '{"call_type":"discovery","prospect_name":"Dr. K","prospect_company":"Unmuted","budget_signals":"$70-90K for Phase 1","timeline":"Alpha by April"}'
  - input: |-
      Title: "Leif Cefalo — MetaCTO <> 30 min intro"
      Transcript start: "Hi, Chris... not too bad, how about yourself..."
      Transcript end: "...great, I'll send that over... schedule follow-up..."
    label: 'Discovery: first meeting with prospect, Chris hosts'
    output: '{"call_type":"discovery","prospect_name":"Leif Cefalo","prospect_company":null}'
  - input: |-
      Title: "SHC Mobile + Web - Daily Scrum"
      Transcript start: "Good morning team, let's go around... what did you work on yesterday..."
      Transcript end: "...any blockers? Alright see you tomorrow..."
    label: 'NOT discovery: recurring team standup with existing client'
    output: '{"call_type":"check-in"}'
