version: 1
# Placeholder — teams.seedSample (and workspace:apply --project) resolve this
# to the live project id at apply time.
orgId: proj_meridian_revenue
name: Meridian Outdoor — Revenue
description: >-
  Sample revenue workspace for Meridian Outdoor Supply, a fictional
  mid-market outdoor-equipment B2B. Four teams under one workspace lead —
