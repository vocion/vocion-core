# Vocion Platform Services
# Langfuse (LLM observability) + Temporal (workflows) + OTel Collector
#
# Retrieval lives in the app Postgres (pgvector, see L.1). Onyx is gone.
#
# Usage:
#   docker compose -f infra/docker-compose.platform.yml -p vocion-platform up -d
#
# Ports:
#   Langfuse UI:     http://localhost:3200
#   Temporal UI:     http://localhost:8233
#   Temporal gRPC:   localhost:7233
#   OTel Collector:  localhost:4317 (gRPC), localhost:4318 (HTTP)

services:
  # ================================================================
  # LANGFUSE - LLM Observability, Prompt Tracking, Evals, Feedback
  # ================================================================
  langfuse-web:
    image: docker.io/langfuse/langfuse:3
    container_name: vocion-langfuse-web
    restart: unless-stopped
    ports:
      - '3200:3000'
    depends_on:
      langfuse-postgres:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_healthy
      langfuse-minio:
        condition: service_started
      langfuse-redis:
        condition: service_healthy
    environment: &langfuse-env
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse-postgres:5432/langfuse
      CLICKHOUSE_URL: http://langfuse-clickhouse:8123
      CLICKHOUSE_MIGRATION_URL: clickhouse://langfuse-clickhouse:9000
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse
      CLICKHOUSE_CLUSTER_ENABLED: 'false'
      REDIS_HOST: langfuse-redis
      REDIS_PORT: '6379'
      REDIS_AUTH: langfuse-redis-pw
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: us-east-1
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: langfuse-minio
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: langfuse-minio-secret
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: 'true'
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: us-east-1
      LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: langfuse-minio
      LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: langfuse-minio-secret
      LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: 'true'
      NEXTAUTH_URL: http://localhost:3200
      NEXTAUTH_SECRET: vocion-langfuse-secret-change-me
      SALT: vocion-langfuse-salt-change-me
      ENCRYPTION_KEY: 9bf2e54550467e89297157670d9545b438a647653e23abecaeaf682cac0e6e1d
      LANGFUSE_INIT_ORG_ID: vocion
      LANGFUSE_INIT_ORG_NAME: Vocion
      LANGFUSE_INIT_PROJECT_ID: demo
      LANGFUSE_INIT_PROJECT_NAME: Demo
      # Real values come from `infra/.env.langfuse.local` (gitignored).
      # Defaults keep fresh clones bootable with a placeholder login.
      LANGFUSE_INIT_USER_EMAIL: ${LANGFUSE_INIT_USER_EMAIL:-admin@vocion.com}
      LANGFUSE_INIT_USER_PASSWORD: ${LANGFUSE_INIT_USER_PASSWORD:-vocion-admin}
      LANGFUSE_INIT_USER_NAME: ${LANGFUSE_INIT_USER_NAME:-Admin}
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: pk-lf-vocion-demo
      LANGFUSE_INIT_PROJECT_SECRET_KEY: sk-lf-vocion-demo
    networks:
      - vocion

  langfuse-worker:
    image: docker.io/langfuse/langfuse-worker:3
    container_name: vocion-langfuse-worker
    restart: unless-stopped
    depends_on:
      langfuse-postgres:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_healthy
      langfuse-minio:
        condition: service_started
      langfuse-redis:
        condition: service_healthy
    environment:
      <<: *langfuse-env
    networks:
      - vocion

  langfuse-postgres:
    image: docker.io/postgres:17-alpine
    container_name: vocion-langfuse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    volumes:
      - langfuse_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: [CMD-SHELL, pg_isready -U langfuse]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - vocion

  langfuse-clickhouse:
    image: docker.io/clickhouse/clickhouse-server
    container_name: vocion-langfuse-clickhouse
    restart: unless-stopped
    user: '101:101'
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse
    volumes:
      - langfuse_ch_data:/var/lib/clickhouse
      - langfuse_ch_logs:/var/log/clickhouse-server
    healthcheck:
      test: [CMD, wget, --no-verbose, --tries=1, --spider, 'http://localhost:8123/ping']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 1s
    networks:
      - vocion

  langfuse-minio:
    image: docker.io/minio/minio
    container_name: vocion-langfuse-minio
    restart: unless-stopped
    entrypoint: sh -c 'mkdir -p /data/langfuse && minio server /data --console-address ":9001"'
    environment:
      MINIO_ROOT_USER: langfuse-minio
      MINIO_ROOT_PASSWORD: langfuse-minio-secret
    volumes:
      - langfuse_minio_data:/data
    networks:
      - vocion

  langfuse-redis:
    image: docker.io/redis:7-alpine
    container_name: vocion-langfuse-redis
    restart: unless-stopped
    command: redis-server --requirepass langfuse-redis-pw
    healthcheck:
      test: [CMD, redis-cli, -a, langfuse-redis-pw, ping]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - vocion

  # ================================================================
  # TEMPORAL - Durable Workflow Orchestration
  # ================================================================
  temporal:
    image: temporalio/auto-setup:latest
    container_name: vocion-temporal
    restart: unless-stopped
    ports:
      - '7233:7233'
    depends_on:
      temporal-postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: temporal-postgres
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development.yaml
    volumes:
      - ./temporal/dynamicconfig:/etc/temporal/config/dynamicconfig
    networks:
      - vocion

  temporal-ui:
    image: temporalio/ui:latest
    container_name: vocion-temporal-ui
    restart: unless-stopped
    ports:
      - '8233:8080'
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    networks:
      - vocion

  temporal-postgres:
    image: docker.io/postgres:17-alpine
    container_name: vocion-temporal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    volumes:
      - temporal_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: [CMD-SHELL, pg_isready -U temporal]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - vocion

  # ================================================================
  # OPENTELEMETRY COLLECTOR - Traces, Metrics, Logs
  # ================================================================
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: vocion-otel-collector
    restart: unless-stopped
    ports:
      - '4317:4317' # OTLP gRPC
      - '4318:4318' # OTLP HTTP
    volumes:
      - ./otel/otel-config.yml:/etc/otelcol-contrib/config.yaml
    networks:
      - vocion

volumes:
  langfuse_pg_data:
  langfuse_ch_data:
  langfuse_ch_logs:
  langfuse_minio_data:
  temporal_pg_data:

networks:
  vocion:
    driver: bridge
