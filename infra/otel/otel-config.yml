# OpenTelemetry Collector config for CoreContext
# Receives traces/metrics/logs from app and forwards to backends

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024

exporters:
  # Console exporter for development debugging
  debug:
    verbosity: basic

  # Langfuse OTLP endpoint (traces)
  # Uncomment and configure when Langfuse OTLP ingestion is set up
  # otlphttp/langfuse:
  #   endpoint: http://langfuse-web:3000/api/public/otel
  #   headers:
  #     Authorization: "Bearer <langfuse-public-key>"

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
