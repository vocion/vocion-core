# Vocion local dev stack — one entrypoint.
#
# Quick start:
#   docker compose up -d   # app DB + platform (Langfuse + Temporal)
#   npm run dev:next       # start Next.js against the running stack
#
# Ports surfaced on the host:
#   :3000   Next.js app       (run with `npm run dev:next`)
#   :5432   App Postgres + pgvector (native retrieval, see L.1)
#   :3200   Langfuse UI
#   :8233   Temporal UI
#   :7233   Temporal gRPC
#   :4317   OTel Collector (gRPC)
#   :4318   OTel Collector (HTTP)

include:
  # Langfuse (LLM observability) + Temporal (workflows) + OTel Collector.
  # Lives in infra/ because the file is large; included here so a single
  # `docker compose up` boots the platform alongside the app DB.
  - infra/docker-compose.platform.yml

services:
  postgres:
    # pgvector/pgvector:pg16 = Postgres 16 + pgvector preinstalled.
    # Required for Phase L native retrieval (migration 0019). The
    # alternative `postgres:16-alpine` would require building the
    # extension from source on container start.
    image: pgvector/pgvector:pg16
    container_name: corecontext-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: corecontext
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [CMD-SHELL, pg_isready -U postgres -d corecontext]
      interval: 5s
      timeout: 3s
      retries: 10

  # Feedback worker — Phase 6. Opt-in: only starts under the `worker`
  # profile (e.g. `docker compose --profile worker up -d`). Requires
  # `ENABLE_FEEDBACK_WORKER=1` in the env file. Replace this dev
  # bind-mount image with a real Dockerfile before deploying to prod.
  worker:
    image: node:20-alpine
    container_name: corecontext-worker
    restart: unless-stopped
    profiles: [worker]
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /app
    volumes:
      - ./:/app
    environment:
      ENABLE_FEEDBACK_WORKER: '1'
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/corecontext
    command: [sh, -c, 'cd packages/core && npm run worker:serve']

  # Temporal worker (Phase H.1). Runs vocionWorkflow Workflows +
  # Activities against the Temporal server in the platform stack.
  # Opt-in via `worker` profile + ENABLE_TEMPORAL_WORKER=1. Requires
  # the platform stack (infra/docker-compose.platform.yml) to be up
  # so `temporal:7233` resolves.
  temporal-worker:
    image: node:20-alpine
    container_name: corecontext-temporal-worker
    restart: unless-stopped
    profiles: [worker]
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /app
    volumes:
      - ./:/app
    environment:
      ENABLE_TEMPORAL_WORKER: '1'
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/corecontext
      VOCION_TEMPORAL_ADDRESS: temporal:7233
      VOCION_TEMPORAL_NAMESPACE: default
    command: [sh, -c, 'cd packages/core && npm run temporal:worker']

volumes:
  pgdata:
