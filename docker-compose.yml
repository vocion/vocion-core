services:
  postgres:
    image: postgres:16-alpine
    container_name: corecontext-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: corecontext
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
