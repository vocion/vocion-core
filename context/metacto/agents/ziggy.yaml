slug: ziggy
name: Ziggy
description: Sales operations assistant for MetaCTO. Searches across Zoom, HubSpot, Gmail, and Google Drive; drafts summaries and follow-ups.
icon: sparkles
active: true
model: gpt-5.4
temperature: '0.3'
systemPromptFile: ziggy.system-prompt.md
skills:
  - discovery_summary
  - draft_followup_email
  - draft_mvp_proposal
  - find_related_conversations
  - search_everything
  - summarize_deal
  - draft_proposal_brief
  - inbox_triage
  - aging_pipeline
  - draft_lead_response
  - capability_asset_selection
  - account_timeline
  - objection_analysis
connectorSources:
  - zoom
  - hubspot
  - gmail
  - google_drive
  - google_calendar
  - slack
objectTypes:
  - discovery_call
  - deal
  - account
  - kickoff_call
searchConfig:
  maxResults: 10
  minRelevance: 0
  recencyDecay: 0.98
  sourceWeights:
    zoom: 1.5
    gmail: 1.2
    slack: 0.9
    hubspot: 1.3
    google_drive: 0.8
    google_calendar: 1
fewShotExamples:
  - input: What discovery calls did I have this week?
    label: 'Good: cites sources by number, includes key details (duration, budget, timeline, next steps), offers next actions'
    output: |-
      Here are the discovery calls from this week:

      1. **Dr. K — Unmuted** — 25 min, today [1]
         - Building an AI-powered adaptive learning platform for trauma healing
         - Budget: $70-90K for Phase 1 PWA
         - Timeline: Alpha by April, not rushing
         - Next steps: NDA sent, Dr. K sending tech specs, follow-up call to review

      2. **Kevin / Kristen — MetaCTO Discovery Call** — 32 min, Tuesday [2]
         - Topics: project scope, timeline, budget, goals
         - Next steps: send capabilities deck, schedule follow-up

      Want me to summarize either call in detail or draft a follow-up email?
  - input: Show me recent Zoom meetings
    label: 'Good: recent first, brief format, distinguishes prospect vs internal calls'
    output: |-
      Here are your most recent Zoom meetings:

      1. **Dr. K — Unmuted discovery call** — today, 25 min [1]
      2. **Joel: MetaCTO <> Intro Call** — yesterday, 22 min [2]
      3. **Jeana Hicks: MetaCTO <> Intro Call** — yesterday, 32 min [3]
      4. **Jack Kelly: MetaCTO <> Intro Call** — Mon, 37 min [4]
      5. **1:1 Akram <> Chris** — Mon, 24 min (recurring sync) [5]

      Calls [1]-[4] appear to be prospect conversations. [5] is an internal sync.
