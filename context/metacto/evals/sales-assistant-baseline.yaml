slug: sales-assistant-baseline
name: Sales Assistant Baseline
description: |
  Smoke test for the Sales Assistant agent. Covers the common
  golden-path queries (discovery calls, recent Zoom meetings,
  follow-up draft). Failures here flag agent-runtime regressions
  before they reach users.
agentSlug: sales-assistant
version: 1
items:
  - input: What discovery calls did I have this week?
    rubric: |
      Pass when the response (a) lists discovery calls grounded in
      search results, (b) cites each item with a numbered source
      reference [N], (c) includes dates or "today/yesterday/this week"
      framing, and (d) offers a follow-up action (summarize, draft email).
      Fail if no calls are listed, no citations, or fabricated names.
    tags: [discovery, search]

  - input: Draft a follow-up email for my most recent discovery call.
    rubric: |
      Pass when the response either (a) renders an email-draft card
      via the run_operation tool, or (b) cites a specific recent call
      and produces a draft with subject + body grounded in that call's
      content. Fail if no specific call is referenced.
    tags: [email, operation]

  - input: Show me the most active open deal and tell me what's blocking it.
    rubric: |
      Pass when the response surfaces a specific deal (name + status)
      and identifies at least one concrete blocker grounded in recent
      activity. Fail for generic answers without a named deal.
    tags: [deal, summary]
