slug: discovery_followup
name: Discovery Follow-up
description: >-
  Post-discovery-call automation. Generates a structured summary from the
  transcript, drafts a capabilities follow-up email in Chris's voice,
  and pauses for human approval before it would be sent (v1: send step
  is a stub; wire to Gmail connector in v2).
version: 1
status: active
trigger:
  type: manual
inputSchema:
  type: object
  required: [transcript, prospect_name]
  properties:
    transcript:
      type: string
      description: Full Zoom transcript text
    prospect_name:
      type: string
    prospect_company:
      type: string
    meeting_title:
      type: string
    host:
      type: string
      default: chris@metacto.com
steps:
  - name: summary
    type: skill
    skill: discovery_summary
    input:
      transcript: '{{input.transcript}}'
      meeting_title: '{{input.meeting_title}}'
      host: '{{input.host}}'

  - name: email
    type: skill
    skill: draft_followup_email
    input:
      discovery_summary: '{{steps.summary.output}}'
      prospect_name: '{{input.prospect_name}}'
      prospect_company: '{{input.prospect_company}}'
      sender_name: Chris

  - name: review
    type: approve
    prompt: Review the drafted follow-up email before sending.
    reviews: email

  - name: send
    type: action
    action: gmail.send_email
    input:
      to: '{{input.prospect_email}}'
      subject_from_step: email
      body_from_step: email
